<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1F3A2E">
<title>VITI Sens — Traçabilité phytosanitaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --craie:#F1F2EC; --craie2:#E5E7DD; --paper:#FCFCF9;
  --vigne:#1F3A2E; --vigne2:#2E5141; --vigne-soft:#E8EEE8;
  --ink:#20251F; --mute:#6A7268; --line:#D5D8CC;
  --laiton:#9C7322; --laiton-soft:#F3EAD4;
  --lie:#8A2D3B; --lie-soft:#F6E6E8;
  --ok:#2E6B45;
  --r:10px; --rs:7px;
  --sh:0 1px 2px rgba(31,58,46,.06),0 8px 24px -12px rgba(31,58,46,.18);
  --display:'Fraunces',Georgia,serif; --body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body);background:var(--craie);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
h1,h2,h3{font-family:var(--display);font-weight:600;line-height:1.15;letter-spacing:-.01em}
.mono{font-variant-numeric:tabular-nums}
a{color:var(--vigne2)}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;background:var(--vigne);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
#login::before{content:"";position:absolute;inset:0;opacity:.06;background-image:radial-gradient(circle at 20% 30%,#fff 0 1px,transparent 1px),radial-gradient(circle at 70% 60%,#fff 0 1px,transparent 1px),radial-gradient(circle at 45% 85%,#fff 0 1px,transparent 1px);background-size:120px 120px,90px 90px,150px 150px}
.login-card{position:relative;background:var(--paper);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 30px 80px -20px rgba(0,0,0,.5)}
.login-card .mark{font-family:var(--display);font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--laiton);font-weight:600}
.login-card h1{font-size:30px;margin:6px 0 4px;color:var(--vigne)}
.login-card p{color:var(--mute);font-size:13px;margin-bottom:24px}
.login-card label{display:block;font-size:12px;font-weight:600;color:var(--mute);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.login-card input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:var(--rs);background:#fff;margin-bottom:16px}
.login-card input:focus{outline:none;border-color:var(--vigne);box-shadow:0 0 0 3px var(--vigne-soft)}
.btn-primary{background:var(--vigne);color:#fff;padding:12px 18px;border-radius:var(--rs);font-weight:600;width:100%;transition:background .15s}
.btn-primary:hover{background:var(--vigne2)}
.login-err{color:var(--lie);font-size:13px;font-weight:500;min-height:18px;margin-top:-6px;margin-bottom:8px}
.login-hint{font-size:11.5px;color:var(--mute);margin-top:18px;text-align:center;line-height:1.5}

/* ---------- APP SHELL ---------- */
#app{display:none;min-height:100vh;grid-template-columns:230px 1fr;grid-template-rows:auto 1fr}
.topbar{grid-column:1/3;background:var(--vigne);color:#fff;display:flex;align-items:center;gap:18px;padding:0 22px;height:58px;position:sticky;top:0;z-index:20}
.topbar .brand{font-family:var(--display);font-weight:600;font-size:18px;letter-spacing:-.01em}
.topbar .brand b{color:var(--laiton-soft)}
.topbar .tag{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#A9C3B2;border-left:1px solid #3C5B4B;padding-left:16px}
.topbar .sp{flex:1}
.topbar .ctx{display:flex;gap:10px;align-items:center;font-size:12.5px;color:#CDDBD1}
.topbar .ctx b{color:#fff}
.topbar .ctx input{background:rgba(255,255,255,.1);border:1px solid #3C5B4B;color:#fff;border-radius:6px;padding:4px 8px;width:130px;font-size:12.5px}
.topbar .ctx input:focus{outline:none;border-color:var(--laiton-soft)}
.iconbtn{color:#CDDBD1;padding:7px;border-radius:6px;display:inline-flex}
.iconbtn:hover{background:rgba(255,255,255,.12);color:#fff}

.nav{background:var(--paper);border-right:1px solid var(--line);padding:14px 12px;display:flex;flex-direction:column;gap:2px;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto}
.nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--rs);color:var(--ink);font-weight:500;font-size:13.5px;cursor:pointer;transition:background .12s}
.nav a:hover{background:var(--craie)}
.nav a.active{background:var(--vigne-soft);color:var(--vigne);font-weight:600}
.nav a svg{width:18px;height:18px;flex:none;stroke-width:1.8}
.nav .grp{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);padding:14px 12px 6px;font-weight:600}

.main{padding:30px 34px 80px;overflow-x:hidden}
.page{display:none;animation:fade .25s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.ph{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.ph .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--laiton);font-weight:600;margin-bottom:4px}
.ph h2{font-size:26px;color:var(--vigne)}
.ph .sub{color:var(--mute);font-size:13px;margin-top:3px}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.card.pad{padding:20px}
.card-h{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-h h3{font-size:15px;color:var(--vigne)}
.grid{display:grid;gap:16px}
.g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)} .g4{grid-template-columns:repeat(4,1fr)}

/* stat tiles */
.stat{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh)}
.stat .k{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);font-weight:600}
.stat .v{font-family:var(--display);font-size:30px;font-weight:600;color:var(--vigne);margin-top:6px;line-height:1}
.stat .v small{font-size:14px;color:var(--mute);font-weight:500;font-family:var(--body)}
.stat.accent .v{color:var(--laiton)}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--mute);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--craie2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--craie)}
.tbl-wrap{overflow-x:auto}
.tag-pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:var(--vigne-soft);color:var(--vigne)}
.tag-pill.lie{background:var(--lie-soft);color:var(--lie)}
.tag-pill.laiton{background:var(--laiton-soft);color:var(--laiton)}
.tag-pill.mute{background:var(--craie2);color:var(--mute)}

/* forms */
.field{margin-bottom:14px}
.field label{display:block;font-size:11.5px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:var(--rs);background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--vigne);box-shadow:0 0 0 3px var(--vigne-soft)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>*{flex:1;min-width:120px}
.btn{padding:9px 15px;border-radius:var(--rs);font-weight:600;font-size:13px;transition:.13s;display:inline-flex;align-items:center;gap:7px}
.btn-g{background:var(--vigne);color:#fff}.btn-g:hover{background:var(--vigne2)}
.btn-o{border:1px solid var(--line);background:#fff;color:var(--ink)}.btn-o:hover{border-color:var(--vigne);color:var(--vigne)}
.btn-l{background:var(--laiton);color:#fff}.btn-l:hover{filter:brightness(1.08)}
.btn-danger{color:var(--lie)}.btn-danger:hover{background:var(--lie-soft)}
.btn-sm{padding:5px 10px;font-size:12px}

/* ---- SIGNATURE : compteur IFT ---- */
.ift-instrument{background:linear-gradient(160deg,var(--vigne) 0%,#16291F 100%);border-radius:var(--r);padding:20px 22px;color:#fff;position:relative;overflow:hidden}
.ift-instrument::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;border:1px solid rgba(255,255,255,.08);border-radius:50%}
.ift-instrument::before{content:"";position:absolute;right:-60px;bottom:-60px;width:180px;height:180px;border:1px solid rgba(255,255,255,.06);border-radius:50%}
.ift-instrument .lbl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#A9C3B2;font-weight:600}
.ift-val{font-family:var(--display);font-size:54px;font-weight:600;line-height:1;margin:8px 0 4px;font-variant-numeric:tabular-nums}
.ift-eq{font-size:12.5px;color:#CDDBD1;font-variant-numeric:tabular-nums}
.ift-eq b{color:var(--laiton-soft)}
.ift-factor{display:flex;gap:18px;margin-top:14px;flex-wrap:wrap}
.ift-factor div{font-size:11.5px;color:#A9C3B2}
.ift-factor b{display:block;font-family:var(--display);font-size:18px;color:#fff;font-variant-numeric:tabular-nums;margin-top:2px}

/* panier produits */
.prod-line{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:var(--rs);background:#fff;margin-bottom:8px}
.prod-line .nm{font-weight:600;font-size:13px}
.prod-line .meta{font-size:11.5px;color:var(--mute)}
.prod-line .ift{margin-left:auto;font-family:var(--display);font-weight:600;color:var(--laiton);font-variant-numeric:tabular-nums}
.alert{border-radius:var(--rs);padding:11px 14px;font-size:13px;display:flex;gap:9px;align-items:flex-start;margin:10px 0}
.alert.danger{background:var(--lie-soft);color:var(--lie);border:1px solid #E7C3C8}
.alert.info{background:var(--vigne-soft);color:var(--vigne);border:1px solid #C9D9CC}
.alert svg{flex:none;width:17px;height:17px;margin-top:1px}

/* autocomplete */
.ac{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:var(--rs);box-shadow:var(--sh);max-height:260px;overflow-y:auto;z-index:30;display:none}
.ac-list.show{display:block}
.ac-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--craie2)}
.ac-item:hover,.ac-item.sel{background:var(--vigne-soft)}
.ac-item .sa{font-size:11.5px;color:var(--mute)}

.empty{text-align:center;padding:46px 20px;color:var(--mute)}
.empty svg{width:34px;height:34px;stroke-width:1.5;color:var(--line);margin-bottom:10px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(20,30,24,.5);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--paper);border-radius:var(--r);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px -20px rgba(0,0,0,.4)}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal-h h3{font-size:16px;color:var(--vigne)}
.modal-b{padding:20px}

/* toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:30px;font-size:13.5px;font-weight:500;z-index:90;transition:transform .3s;box-shadow:0 10px 30px rgba(0,0,0,.3)}
#toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:860px){
  #app{grid-template-columns:1fr}
  .nav{position:fixed;bottom:0;left:0;right:0;top:auto;height:auto;flex-direction:row;border-right:none;border-top:1px solid var(--line);padding:6px;z-index:30;justify-content:space-around;overflow-x:auto}
  .nav .grp{display:none}
  .nav a{flex-direction:column;gap:3px;font-size:10px;padding:7px 8px;text-align:center;min-width:60px}
  .nav a span{white-space:nowrap}
  .topbar{grid-column:1}
  .main{padding:22px 16px 90px}
  .g3,.g4,.g2{grid-template-columns:1fr}
  .topbar .tag{display:none}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="login-card">
    <div class="mark">VITI Sens · Champagne</div>
    <h1>Traçabilité phytosanitaire</h1>
    <p>Suivi des passages, calcul d'IFT et gestion parcellaire.</p>
    <label for="lmail">Adresse e-mail</label>
    <input type="email" id="lmail" autocomplete="username" placeholder="vous@domaine.fr" onkeydown="if(event.key==='Enter')document.getElementById('lpwd').focus()">
    <label for="lpwd">Mot de passe</label>
    <input type="password" id="lpwd" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="lerr"></div>
    <button class="btn-primary" onclick="doLogin()">Se connecter</button>
    <div class="login-hint" id="lhint"></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <header class="topbar">
    <div class="brand">VITI<b>·</b>Sens</div>
    <div class="tag">Traçabilité</div>
    <div class="sp"></div>
    <div class="ctx">
      <span>Client <b id="ctxClient">—</b></span>
      <span>Campagne</span><input id="ctxCamp" maxlength="9" oninput="meta.campagne=this.value;saveDB()">
    </div>
    <button id="roReturn" class="iconbtn" style="display:none;background:var(--laiton);color:#fff;font-size:12px;font-weight:600;padding:6px 12px;gap:6px" onclick="returnToOwn()">⟲ Dossier <span id="roLabel"></span> — revenir à mes clients</button>
    <button class="iconbtn" title="Réglages" onclick="openSettings()">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button class="iconbtn" title="Quitter la session" onclick="logout()">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </header>

  <nav class="nav" id="nav">
    <a data-pg="clients" class="consultant-only" style="display:none" onclick="go('clients')"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg><span>Mes clients</span></a>
    <div class="grp">Pilotage</div>
    <a data-pg="dash" class="active" onclick="go('dash')"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Tableau de bord</span></a>
    <a data-pg="saisie" onclick="go('saisie')"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>Saisir un passage</span></a>
    <a data-pg="bilan" onclick="go('bilan')"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Bilan & IFT</span></a>
    <div class="grp">Référentiels</div>
    <a data-pg="parcelles" onclick="go('parcelles')"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg><span>Parcellaire</span></a>
    <a data-pg="ilots" onclick="go('ilots')"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg><span>Îlots</span></a>
    <a data-pg="produits" onclick="go('produits')"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><path d="M9 3h6M10 3v6.5L5 19a2 2 0 0 0 1.8 3h10.4A2 2 0 0 0 19 19l-5-9.5V3"/><line x1="7.5" y1="14" x2="16.5" y2="14"/></svg><span>Produits e-phy</span></a>
    <div class="grp">Compte</div>
    <a onclick="openSettings()"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>Réglages</span></a>
    <a onclick="logout()" style="color:var(--lie)"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Déconnexion</span></a>
  </nav>

  <main class="main">
    <!-- DASHBOARD -->
    <section class="page active" id="pg-dash"></section>
    <!-- CLIENTS (consultant) -->
    <section class="page" id="pg-clients"></section>
    <!-- SAISIE -->
    <section class="page" id="pg-saisie"></section>
    <!-- BILAN -->
    <section class="page" id="pg-bilan"></section>
    <!-- PARCELLES -->
    <section class="page" id="pg-parcelles"></section>
    <!-- ILOTS -->
    <section class="page" id="pg-ilots"></section>
    <!-- PRODUITS -->
    <section class="page" id="pg-produits"></section>
  </main>
</div>

<div class="modal-bg" id="modalBg"><div class="modal"><div class="modal-h"><h3 id="modalTitle"></h3><button class="iconbtn" onclick="closeModal()" style="color:var(--mute)"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="modal-b" id="modalBody"></div></div></div>
<div id="toast"></div>

/* ===================== CALCULS ===================== */
function ratioIlot(nom){
  const ps=parcelles.filter(p=>p.ilot===nom);
  const cad=ps.reduce((s,p)=>s+(+p.cad||0),0);
  const pl=ps.reduce((s,p)=>s+(+p.pl||0),0);
  return cad>0?pl/cad:1;
}
function ilotSurfaces(nom){
  const ps=parcelles.filter(p=>p.ilot===nom);
  return {cad:ps.reduce((s,p)=>s+(+p.cad||0),0),pl:ps.reduce((s,p)=>s+(+p.pl||0),0),nb:ps.length};
}
function calcIFT(doseAppli,doseHom,ratio){
  const da=parseFloat(String(doseAppli).replace(',','.')), dh=parseFloat(String(doseHom).replace(',','.'));
  if(!(da>0)||!(dh>0))return null;
  return (da/dh)*ratio;
}
/* un produit compte dans l'IFT selon son type, sauf si le passage est en lutte FD obligatoire */
function produitCompteIFT(prod,passageFD){
  if(passageFD)return false;
  const t=TYPES[prod.type]||TYPES.autre;
  return !!t.ift;
}
/* catégorie d'IFT d'un produit : 'h' herbicide, 'hh' hors-herbicide, 'bio' biocontrôle, 'none' */
function catIFT(prod){return (TYPES[prod.type]||TYPES.autre).cat;}

/* ===== RÈGLE DE MÉLANGE — arrêté 7 avril 2010 modifié 12 juin 2015 ===== */
function analyseMelange(prods,stadeCode){
  const out=[]; if(prods.length<2 && prods.length>0){/* un seul produit : pas de mélange */ if(prods.length<2)return out;}
  // 1) au moins UN produit avec une mention de la liste d'interdiction directe
  prods.forEach(p=>{const inter=hList(p).filter(h=>H_INTERDIT_SEUL.includes(h));
    if(inter.length)out.push({lvl:'interdit',t:`${p.n} porte ${inter.join(', ')} — mélange interdit (un seul produit suffit).`});});
  // helpers comptage ≥2
  const cnt=grp=>prods.filter(p=>hList(p).some(h=>grp.includes(h)));
  const muta=cnt(H_GRP_MUTA);   if(muta.length>=2)out.push({lvl:'interdit',t:`≥2 produits avec H341/H351/H371 : ${muta.map(p=>p.n).join(', ')} — mélange interdit.`});
  const stot=cnt(H_GRP_STOT);   if(stot.length>=2)out.push({lvl:'interdit',t:`≥2 produits avec H373 : ${stot.map(p=>p.n).join(', ')} — mélange interdit.`});
  const repro=cnt(H_GRP_REPRO); if(repro.length>=2)out.push({lvl:'interdit',t:`≥2 produits avec H361d/H361fd/H361f/H362 : ${repro.map(p=>p.n).join(', ')} — mélange interdit.`});
  // 2) ZNT ≥ 100 m (aquatique/terrestre, classe 4)
  prods.forEach(p=>{const z=parseFloat(String(p.znt).replace(',','.'));
    if(z>=100)out.push({lvl:'interdit',t:`${p.n} : ZNT ${z} m (≥100 m) — mélange interdit.`});});
  // 3) floraison/exsudats : pyréthrinoïde + (triazole ou imidazole)
  if(estFloraison(stadeCode)){
    const pyr=prods.filter(p=>p.fam&&p.fam.pyr), tim=prods.filter(p=>p.fam&&(p.fam.tri||p.fam.imi));
    if(pyr.length&&tim.length)out.push({lvl:'interdit',
      t:`Floraison : pyréthrinoïde (${pyr.map(p=>p.n).join(', ')}) + triazole/imidazole (${tim.map(p=>p.n).join(', ')}) — mélange interdit pendant la floraison.`});
  }
  return out;
}

let clientsCache=[];
function iftFromPayload(d){
  const parc=d.parcelles||[], pass=d.passages||[];
  const St=parc.reduce((s,p)=>s+(+p.pl||0),0)||1; let a={h:0,hh:0,bio:0};
  pass.forEach(pa=>{const sPl=pa.sPl||parc.filter(p=>p.ilot===pa.ilot).reduce((s,p)=>s+(+p.pl||0),0);const w=(sPl||0)/St;
    (pa.produits||[]).forEach(pr=>{if(pr.ift==null)return;const c=catIFT(pr);if(a[c]!=null)a[c]+=pr.ift*w;});});
  return a;
}

function enregistrerPassage(){

function sTotExploit(){return parcelles.reduce((s,p)=>s+(+p.pl||0),0);}
function iftExploit(){
  const St=sTotExploit()||1; let a={h:0,hh:0,bio:0};
  passages.forEach(pa=>{const w=(pa.sPl||ilotSurfaces(pa.ilot).pl||0)/St;
    pa.produits.forEach(pr=>{if(pr.ift==null)return;const c=catIFT(pr);if(a[c]!=null)a[c]+=pr.ift*w;});});
  return a;
}
function iftParIlot(){const m={};
  passages.forEach(pa=>{const k=pa.ilot||'—';m[k]=m[k]||{h:0,hh:0,bio:0,nb:0};m[k].nb++;
    pa.produits.forEach(pr=>{if(pr.ift==null)return;const c=catIFT(pr);if(m[k][c]!=null)m[k][c]+=pr.ift;});});
  return m;}

function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=()=>{try{const d=JSON.parse(rd.result);parcelles=d.parcelles||parcelles;ilots=d.ilots||ilots;passages=d.passages||passages;meta=d.meta||meta;saveDB();toast('Données importées');go('dash');}catch(err){toast('Fichier illisible');}};rd.readAsText(f);};
  inp.click();
}
function exportCSV(){
  let rows=[['Date','Ilot','Stade','Ratio','LutteFD','Specialite','Type','Matiere active','Dose appli','Dose hom','Unite','Cible','DAR','ZNT','Mentions H','IFT']];
  passages.sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(pa=>pa.produits.forEach(p=>{
    rows.push([pa.date,pa.ilot,pa.stadeLbl||pa.stade,String(pa.ratio||1).replace('.',','),pa.fd?'OUI':'',p.n,(TYPES[p.type]||TYPES.autre).lbl,p.sa,String(p.doseAppli).replace('.',','),String(p.doseHom).replace('.',','),p.unite,p.cible,p.dar,p.znt,p.h,p.ift==null?'':String(p.ift).replace('.',',')]);}));
  const csv=rows.map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(';')).join('\r\n');
  dl(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),`VITI_Sens_traca_${meta.campagne}.csv`);toast('Export CSV téléchargé');
}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href);}

function openSettings(){
  openModal('Réglages',`
   <div class="field"><label>Nom du client / exploitation</label><input id="setClient" value="${esc(meta.client)}" placeholder="Nom de l'exploitation…"></div>
   <div class="field"><label>Campagne</label><input id="setCamp" value="${esc(meta.campagne)}"></div>
   <button class="btn btn-g" onclick="saveSettings()">Enregistrer</button>
   <div style="border-top:1px solid var(--line);margin:18px 0"></div>
   <div class="field"><label>Changer mon mot de passe</label><input id="setPwd" type="password" placeholder="Nouveau mot de passe (min. 6 caractères)"></div>
   <button class="btn btn-o" onclick="changePwd()">Mettre à jour le mot de passe</button>
   <div style="border-top:1px solid var(--line);margin:18px 0"></div>
   <div style="font-size:12px;color:var(--mute);margin-bottom:10px">Réinitialiser efface parcelles, îlots et passages de ce compte (sauvegarde JSON conseillée avant, via le Bilan).</div>
   <div class="row"><button class="btn btn-o" onclick="if(confirm('Repartir d\\'un modèle vierge ? Les données de ce compte seront effacées.')){seedDB();closeModal();go('dash');toast('Modèle vierge');}">Modèle vierge</button>
   <button class="btn btn-o" onclick="if(confirm('Charger le jeu d\\'exemple (HOTTE BIFFROTEAUX) ?')){chargerExemple();closeModal();go('dash');toast('Exemple chargé');}">Charger l'exemple</button></div>`);
}
function saveSettings(){meta.client=document.getElementById('setClient').value;meta.campagne=document.getElementById('setCamp').value;saveDB();closeModal();go('dash');toast('Réglages enregistrés');}
async function changePwd(){const v=document.getElementById('setPwd').value;if(v.length<6){toast('6 caractères minimum.');return;}
  if(!SB){toast('Non disponible.');return;}
  const {error}=await SB.auth.updateUser({password:v});
  toast(error?('Erreur : '+error.message):'Mot de passe mis à jour');if(!error)closeModal();}
function openModal(t,html){document.getElementById('modalTitle').textContent=t;document.getElementById('modalBody').innerHTML=html;document.getElementById('modalBg').classList.add('show');}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal();});
document.addEventListener('click',e=>{if(!e.target.closest('.ac'))document.getElementById('acList')?.classList.remove('show');});
